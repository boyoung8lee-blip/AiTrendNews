name: Daily AI digest

on:
  schedule:
    # GitHub Actions는 UTC 기준. 예약 실행은 지연/누락이 잦아 두 번 건다.
    # 정각·매시 근처는 GitHub 부하가 커 누락이 잦으므로 한산한 새벽 시간대 + odd-minute로 분산.
    - cron: "27 18 * * *"   # 18:27 UTC = KST 03:27 (한산한 시간대)
    - cron: "53 19 * * *"   # 19:53 UTC = KST 04:53 (1차 누락 시 보완)
  workflow_dispatch:   # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write       # data.json을 커밋해 다시 푸시하기 위함

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Crawl & pick 3
        run: python crawl.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: daily digest $(date -u +%Y-%m-%d)"
          git push
