name: Daily AI digest

on:
  schedule:
    # GitHub Actions는 UTC 기준. 예약 실행은 지연/누락이 잦아 두 번 건다.
    - cron: "5 1 * * *"    # 01:05 UTC = KST 10:05 (정각 혼잡 회피)
    - cron: "30 1 * * *"   # 01:30 UTC = KST 10:30 (1차 누락 시 보완)
  workflow_dispatch:   # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write       # data.json을 커밋해 다시 푸시하기 위함

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Crawl & pick 3
        run: python crawl.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: daily digest $(date -u +%Y-%m-%d)"
          git push
