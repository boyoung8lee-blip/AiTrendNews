name: Daily AI digest

on:
  schedule:
    # GitHub Actions는 UTC 기준. 01:00 UTC = 한국시간(KST) 오전 10시
    - cron: "0 1 * * *"
  workflow_dispatch:   # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write       # data.json을 커밋해 다시 푸시하기 위함

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Crawl & pick 3
        run: python crawl.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: daily digest $(date -u +%Y-%m-%d)"
          git push
