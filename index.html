<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 동향 — 오늘의 읽을거리</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<style>
  :root {
    --paper:#f4efe4; --ink:#211d18; --muted:#6b6356;
    --accent:#b8472e; --line:#d8cfbd; --card:#fbf8f0;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--paper); color:var(--ink);
    font-family:"Pretendard",sans-serif; line-height:1.7;
    background-image:radial-gradient(var(--line) 0.5px, transparent 0.5px);
    background-size:22px 22px;
  }
  .wrap { max-width:720px; margin:0 auto; padding:56px 24px 96px; }

  header { border-bottom:3px double var(--ink); padding-bottom:20px; margin-bottom:8px; }
  .masthead { display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; }
  h1 { font-family:"Gowun Batang",serif; font-size:38px; font-weight:700; letter-spacing:-0.5px; }
  h1 .dot { color:var(--accent); }
  .tagline { color:var(--muted); font-size:14px; }
  #today { color:var(--accent); font-size:14px; font-weight:600; white-space:nowrap; }

  .day { margin-top:44px; }
  .day-label {
    font-family:"Gowun Batang",serif; font-size:15px; color:var(--muted);
    display:flex; align-items:center; gap:12px; margin-bottom:20px;
  }
  .day-label::after { content:""; flex:1; height:1px; background:var(--line); }

  .item {
    background:var(--card); border:1px solid var(--line);
    border-left:4px solid var(--accent); border-radius:2px;
    padding:20px 22px; margin-bottom:16px;
    transition:transform .15s ease, box-shadow .15s ease;
    opacity:0; transform:translateY(8px); animation:rise .5s ease forwards;
  }
  .item:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(33,29,24,.08); }
  @keyframes rise { to { opacity:1; transform:translateY(0); } }

  .item .src { font-size:12px; color:var(--accent); font-weight:600; letter-spacing:.3px; }
  .item h2 { font-family:"Gowun Batang",serif; font-size:20px; font-weight:700; line-height:1.4; margin:6px 0 8px; }
  .item h2 a { color:var(--ink); text-decoration:none; }
  .item h2 a:hover { color:var(--accent); text-decoration:underline; text-underline-offset:3px; }
  .item p { color:#3a342b; font-size:15px; }
  .tags { margin-top:12px; display:flex; flex-wrap:wrap; gap:6px; }
  .tag { font-size:11px; color:var(--muted); border:1px solid var(--line); border-radius:999px; padding:2px 10px; }

  .msg { margin-top:44px; color:var(--muted); font-size:15px; text-align:center; }

  /* 설정 패널 */
  .config-panel {
    margin-top:28px; background:var(--card); border:1px solid var(--line);
    border-radius:2px; padding:18px 22px;
  }
  .config-toggle {
    display:flex; align-items:center; justify-content:space-between;
    cursor:pointer; user-select:none;
  }
  .config-toggle h3 { font-family:"Gowun Batang",serif; font-size:15px; color:var(--muted); }
  .config-toggle .arrow { font-size:12px; color:var(--muted); transition:transform .2s; }
  .config-toggle.open .arrow { transform:rotate(180deg); }
  .config-body { display:none; margin-top:16px; }
  .config-body.open { display:block; }

  .meta-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px; font-size:13px; color:var(--muted); }
  .meta-label { font-weight:600; white-space:nowrap; }
  .meta-badge {
    font-size:12px; color:var(--accent); border:1px solid var(--accent);
    border-radius:999px; padding:1px 10px;
  }

  .kw-section { margin-top:12px; }
  .kw-section label { font-size:13px; color:var(--muted); font-weight:600; display:block; margin-bottom:8px; }
  .kw-tags { display:flex; flex-wrap:wrap; gap:6px; }
  .kw-tag {
    font-size:12px; color:var(--ink); background:var(--paper);
    border:1px solid var(--line); border-radius:999px;
    padding:3px 10px; display:flex; align-items:center; gap:5px;
  }
  .kw-tag .del { cursor:pointer; color:var(--muted); font-size:14px; line-height:1; }
  .kw-tag .del:hover { color:var(--accent); }
  .kw-add {
    font-size:12px; color:var(--accent); border:1px dashed var(--accent);
    border-radius:999px; padding:3px 12px; cursor:pointer; background:none;
    font-family:inherit;
  }
  .kw-add:hover { background:rgba(184,71,46,.06); }
  .kw-input {
    font-size:12px; border:1px solid var(--accent); border-radius:999px;
    padding:3px 10px; outline:none; font-family:inherit; background:var(--paper);
    width:120px;
  }
  .config-actions { margin-top:14px; display:flex; gap:8px; }
  .btn-reset { font-size:12px; color:var(--muted); background:none; border:1px solid var(--line); border-radius:4px; padding:4px 12px; cursor:pointer; font-family:inherit; }
  .btn-reset:hover { border-color:var(--muted); }
  .btn-copy { font-size:12px; color:#fff; background:var(--accent); border:none; border-radius:4px; padding:4px 12px; cursor:pointer; font-family:inherit; }
  .btn-copy:hover { opacity:.85; }
  .copy-hint { font-size:11px; color:var(--muted); margin-top:6px; display:none; }

  footer { margin-top:64px; text-align:center; color:var(--muted); font-size:13px; }
  footer a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="masthead">
      <h1>AI 동향<span class="dot">.</span></h1>
      <span id="today"></span>
    </div>
    <p class="tagline">매일 오전 10시, 자동으로 고른 세 개.</p>
  </header>

  <div class="config-panel" id="configPanel">
    <div class="config-toggle" id="configToggle">
      <h3>⚙ 수집 설정</h3>
      <span class="arrow">▼</span>
    </div>
    <div class="config-body" id="configBody">
      <div class="meta-row">
        <span class="meta-label">검색 범위</span>
        <span id="sourceBadges"></span>
      </div>
      <div class="meta-row">
        <span class="meta-label">선정 주체</span>
        <span class="meta-badge" id="scorerBadge">—</span>
      </div>
      <div class="kw-section">
        <label>관심 키워드 (crawl 점수에 반영)</label>
        <div class="kw-tags" id="kwTags"></div>
        <div class="config-actions">
          <button class="btn-reset" id="btnReset">기본값으로 초기화</button>
          <button class="btn-copy" id="btnCopy">config.json 복사</button>
        </div>
        <p class="copy-hint" id="copyHint">✓ 클립보드에 복사됐습니다. GitHub에서 config.json에 붙여넣으면 다음 crawl에 반영됩니다.</p>
      </div>
    </div>
  </div>

  <main id="feed"></main>

  <footer>
    출처 ·
    <a href="https://discuss.pytorch.kr/c/news/14" target="_blank">PyTorch KR</a> ·
    <a href="https://news.hada.io/" target="_blank">GeekNews</a>
  </footer>

</div>

<script>
/* 미리보기(file://)에서 data.json을 못 읽을 때 보여줄 폴백 데이터.
   실제 배포(GitHub Pages)에서는 항상 data.json의 최신 내용을 사용한다. */
const FALLBACK = [
  { date:"2026-06-06", source:"PyTorch KR",
    title:"사고 패치(Thought Patching): 프롬프트를 가중치로 바꾸는 모델 편집 연구",
    url:"https://discuss.pytorch.kr/t/thought-patching-feat-google/10554",
    summary:"프롬프트로 주던 지시를 모델 가중치에 새겨넣는 편집 기법.",
    tags:["paper","LLM","model-editing"] }
];

const esc = (s) => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function fmtDay(d) {
  const [y,m,day] = d.split("-").map(Number);
  const wd = ["일","월","화","수","목","금","토"][new Date(y,m-1,day).getDay()];
  return `${y}년 ${m}월 ${day}일 (${wd})`;
}

function render(data) {
  const now = new Date();
  document.getElementById("today").textContent =
    `${now.getFullYear()}. ${now.getMonth()+1}. ${now.getDate()}.`;

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  if (!data || !data.length) {
    feed.innerHTML = `<p class="msg">아직 표시할 글이 없어요.</p>`;
    return;
  }

  // 날짜별로 묶고 최신 날짜 먼저
  const byDate = {};
  for (const it of data) (byDate[it.date] ??= []).push(it);
  const dates = Object.keys(byDate).sort().reverse();

  let delay = 0;
  for (const d of dates) {
    const sec = document.createElement("section");
    sec.className = "day";
    sec.innerHTML = `<div class="day-label">${fmtDay(d)}</div>`;
    for (const it of byDate[d]) {
      const tags = (it.tags||[]).map(t => `<span class="tag">#${esc(t)}</span>`).join("");
      const card = document.createElement("article");
      card.className = "item";
      card.style.animationDelay = (delay += 60) + "ms";
      card.innerHTML = `
        <div class="src">${esc(it.source)}</div>
        <h2><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a></h2>
        <p>${esc(it.summary)}</p>
        ${tags ? `<div class="tags">${tags}</div>` : ""}`;
      sec.appendChild(card);
    }
    feed.appendChild(sec);
  }
}

// data.json을 읽고, 실패하면 폴백으로 그린다
fetch("data.json", { cache: "no-store" })
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(() => render(FALLBACK));

// ── 설정 패널 ──────────────────────────────────────────────
const LS_KEY = "ai_interest_keywords";
let defaultKeywords = [];

fetch("config.json", { cache: "no-store" })
  .then(r => r.json())
  .then(cfg => {
    defaultKeywords = cfg.interest_keywords || [];

    // 소스 배지
    const badges = (cfg.sources || []).map(s =>
      `<a href="${esc(s.url)}" target="_blank" class="meta-badge">${esc(s.name)}</a>`
    ).join(" ");
    document.getElementById("sourceBadges").innerHTML = badges;

    // 선정 주체
    document.getElementById("scorerBadge").textContent = cfg.scorer || "규칙 기반";

    renderKeywords();
  })
  .catch(() => renderKeywords());

function getKeywords() {
  const saved = localStorage.getItem(LS_KEY);
  return saved ? JSON.parse(saved) : defaultKeywords;
}

function saveKeywords(kws) {
  localStorage.setItem(LS_KEY, JSON.stringify(kws));
}

function renderKeywords() {
  const kws = getKeywords();
  const container = document.getElementById("kwTags");
  container.innerHTML = "";

  kws.forEach((kw, i) => {
    const tag = document.createElement("span");
    tag.className = "kw-tag";
    tag.innerHTML = `${esc(kw)}<span class="del" data-i="${i}">×</span>`;
    tag.querySelector(".del").addEventListener("click", () => {
      const updated = getKeywords();
      updated.splice(i, 1);
      saveKeywords(updated);
      renderKeywords();
    });
    container.appendChild(tag);
  });

  // + 추가 버튼
  const addBtn = document.createElement("button");
  addBtn.className = "kw-add";
  addBtn.textContent = "+ 추가";
  addBtn.addEventListener("click", () => {
    addBtn.style.display = "none";
    const input = document.createElement("input");
    input.className = "kw-input";
    input.placeholder = "키워드 입력";
    container.appendChild(input);
    input.focus();
    const commit = () => {
      const v = input.value.trim();
      if (v) {
        const updated = getKeywords();
        updated.push(v);
        saveKeywords(updated);
      }
      renderKeywords();
    };
    input.addEventListener("keydown", e => { if (e.key === "Enter") commit(); if (e.key === "Escape") renderKeywords(); });
    input.addEventListener("blur", commit);
  });
  container.appendChild(addBtn);
}

// 토글
document.getElementById("configToggle").addEventListener("click", () => {
  const toggle = document.getElementById("configToggle");
  const body = document.getElementById("configBody");
  toggle.classList.toggle("open");
  body.classList.toggle("open");
});

// 초기화
document.getElementById("btnReset").addEventListener("click", () => {
  localStorage.removeItem(LS_KEY);
  renderKeywords();
});

// config.json 복사
document.getElementById("btnCopy").addEventListener("click", () => {
  fetch("config.json", { cache: "no-store" })
    .then(r => r.json())
    .then(cfg => {
      cfg.interest_keywords = getKeywords();
      navigator.clipboard.writeText(JSON.stringify(cfg, null, 2)).then(() => {
        const hint = document.getElementById("copyHint");
        hint.style.display = "block";
        setTimeout(() => { hint.style.display = "none"; }, 4000);
      });
    });
});
</script>
</body>
</html>
